<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lexicon</title>
  <link rel="stylesheet" href="styles/design-tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-serif);
      background-color: var(--color-bg);
      color: var(--color-primary-text);
      min-height: 100vh;
      padding: var(--spacing-xl) var(--spacing-md);
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #hub-container {
      max-width: 600px;
      margin: 0 auto;
    }

    #hub-title {
      font-size: 2rem;
      text-align: center;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-primary-text);
      margin-bottom: var(--spacing-sm);
    }

    #hub-tagline {
      text-align: center;
      font-size: 1rem;
      opacity: 0.65;
      margin-bottom: var(--spacing-xl);
    }

    #hub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
    }

    .game-card {
      display: flex;
      flex-direction: column;
      aspect-ratio: 1;
      background: #FFFFFF;
      border-radius: var(--block-radius);
      box-shadow: var(--shadow-md);
      text-align: center;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      overflow: hidden;
      transition:
        opacity var(--transition-normal),
        filter var(--transition-normal),
        transform var(--transition-normal),
        box-shadow var(--transition-normal);
    }

    .game-card:not(.disabled):hover {
      filter: brightness(0.95) saturate(1.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.15),
                  0 4px 8px -2px rgba(0, 0, 0, 0.10);
    }

    .game-card.disabled {
      opacity: 0.45;
      filter: grayscale(80%);
      cursor: default;
      pointer-events: none;
    }

    .game-card.completed {
      opacity: 0.65;
    }

    .card-preview {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      width: 100%;
    }

    .card-preview svg {
      width: 55%;
    }

    .game-card h2 {
      font-size: 1rem;
      font-family: var(--font-serif);
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-primary-text);
      padding: var(--spacing-md);
      border-top: 1px solid rgba(28, 27, 24, 0.07);
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="hub-container">
    <h1 id="hub-title" data-collection-name="Lexicon">Lexicon</h1>
    <p id="hub-tagline">Daily word puzzles</p>

    <div id="hub-grid">

      <a href="vowel.html" class="game-card" id="card-vowel" data-game="vowel">
        <div class="card-preview">
          <!-- Three rows of blocks: amber = vowel, dark = consonant -->
          <svg viewBox="0 0 124 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="0"   y="0"  width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="26"  y="0"  width="20" height="20" rx="3" fill="#D4A574"/>
            <rect x="52"  y="0"  width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="78"  y="0"  width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="104" y="0"  width="20" height="20" rx="3" fill="#D4A574"/>
            <rect x="0"   y="30" width="20" height="20" rx="3" fill="#D4A574"/>
            <rect x="26"  y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="52"  y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="78"  y="30" width="20" height="20" rx="3" fill="#D4A574"/>
            <rect x="104" y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="0"   y="60" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="26"  y="60" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="52"  y="60" width="20" height="20" rx="3" fill="#D4A574"/>
            <rect x="78"  y="60" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="104" y="60" width="20" height="20" rx="3" fill="#2C2B28"/>
          </svg>
        </div>
        <h2>Vowel</h2>
      </a>

      <a class="game-card" id="card-ladder" href="ladder.html">
        <div class="card-preview">
          <!-- Three rows: green (target), dark (current), light grey (history) -->
          <svg viewBox="0 0 124 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="0"   y="0"  width="20" height="20" rx="3" fill="#8BAF7C"/>
            <rect x="26"  y="0"  width="20" height="20" rx="3" fill="#8BAF7C"/>
            <rect x="52"  y="0"  width="20" height="20" rx="3" fill="#8BAF7C"/>
            <rect x="78"  y="0"  width="20" height="20" rx="3" fill="#8BAF7C"/>
            <rect x="104" y="0"  width="20" height="20" rx="3" fill="#8BAF7C"/>
            <rect x="0"   y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="26"  y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="52"  y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="78"  y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="104" y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="0"   y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="26"  y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="52"  y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="78"  y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="104" y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
          </svg>
        </div>
        <h2>Ladder</h2>
      </a>

      <div class="game-card disabled" id="card-hunt" aria-disabled="true">
        <div class="card-preview">
          <!-- Three rows of neutral grey blocks (placeholder) -->
          <svg viewBox="0 0 124 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="0"   y="0"  width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="26"  y="0"  width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="52"  y="0"  width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="78"  y="0"  width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="104" y="0"  width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="0"   y="30" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="26"  y="30" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="52"  y="30" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="78"  y="30" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="104" y="30" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="0"   y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="26"  y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="52"  y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="78"  y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="104" y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
          </svg>
        </div>
        <h2>Hunt</h2>
      </div>

      <a href="cipher.html" class="game-card" id="card-cipher">
        <div class="card-preview">
          <!-- Three rows of blocks: dark grey and light grey random pattern -->
          <svg viewBox="0 0 124 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="0"   y="0"  width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="26"  y="0"  width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="52"  y="0"  width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="78"  y="0"  width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="104" y="0"  width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="0"   y="30" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="26"  y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="52"  y="30" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="78"  y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="104" y="30" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="0"   y="60" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="26"  y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="52"  y="60" width="20" height="20" rx="3" fill="#2C2B28"/>
            <rect x="78"  y="60" width="20" height="20" rx="3" fill="#D8D5CE"/>
            <rect x="104" y="60" width="20" height="20" rx="3" fill="#2C2B28"/>
          </svg>
        </div>
        <h2>Cipher</h2>
      </a>

    </div>
  </div>

  <script>
  // localStorage namespace:
  // - wordGames_dailyStatus: { vowel: { completed, dateKey, timestamp }, ... } — shared hub key
  // - vowel_*, ladder_*, hunt_* prefixes: game-specific state (owned by each game)
  (function() {
    try {
      const status = JSON.parse(localStorage.getItem('wordGames_dailyStatus') || '{}');
      const today = new Date().toISOString().split('T')[0];
      ['vowel', 'ladder', 'hunt', 'cipher'].forEach(function(gameId) {
        const record = status[gameId];
        if (record && record.completed && record.dateKey === today) {
          const card = document.getElementById('card-' + gameId);
          if (card) card.classList.add('completed');
        }
      });
    } catch(e) {
      // localStorage unavailable — ignore silently
    }
  })();
  </script>
</body>
</html>
