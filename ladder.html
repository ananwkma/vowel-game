<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Word Ladder">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/180/D4A574/1C1B18?text=L">
  <title>Word Ladder — Word Games</title>
  <!-- REQUIRED: Shared design tokens for visual consistency across all games -->
  <link rel="stylesheet" href="styles/design-tokens.css">
  <style>
    /* ============================================================
       SECTION: GOOGLE FONTS
    ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap');

    /* ============================================================
       SECTION: CSS VARIABLES
       Bridge: map shared token names to ladder-specific names
    ============================================================ */
    :root {
      --color-ladder-primary: var(--color-primary);       /* amber for selected tile */
      --color-ladder-bg: var(--color-bg);
      --color-ladder-text: var(--color-primary-text);
      --color-ladder-warning: var(--color-warning);       /* give-up bar fill */
      --color-ladder-success: var(--color-success);       /* results solved */
    }

    /* ============================================================
       SECTION: GLOBAL RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      font-family: var(--font-serif);
      background-color: var(--color-ladder-bg);
      color: var(--color-ladder-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ============================================================
       SECTION: BACK TO HUB
    ============================================================ */
    #back-link {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      z-index: 1000;
      padding: 8px 16px;
      background-color: transparent;
      color: var(--color-ladder-primary);
      text-decoration: none;
      font-family: var(--font-serif);
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: var(--block-radius);
      transition: background-color var(--transition-fast);
      -webkit-user-select: none;
      user-select: none;
    }

    #back-link:hover {
      background-color: rgba(212, 165, 116, 0.1);
    }

    #back-link:active {
      background-color: rgba(212, 165, 116, 0.2);
    }

    /* ============================================================
       SECTION: LAYOUT
    ============================================================ */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
      gap: var(--spacing-md);
      max-width: 400px;
      margin: 0 auto;
      width: 100%;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      padding-bottom: var(--spacing-xl);
    }

    #target-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      font-family: var(--font-serif);
    }

    #target-display {
      text-align: center;
      letter-spacing: 0.15em;
      font-weight: 700;
      font-size: 2rem;
      font-family: var(--font-serif);
    }

    /* ============================================================
       SECTION: TILES
    ============================================================ */
    #tiles-container {
      display: flex;
      flex-direction: row;
      gap: var(--block-gap);
      justify-content: center;
    }

    .tile {
      width: var(--block-size);
      height: var(--block-size);
      border-radius: var(--block-radius);
      background-color: var(--color-secondary);
      color: var(--color-secondary-text);
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: var(--shadow-md);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .tile.selected {
      border-color: var(--color-ladder-primary);
      box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.35);
    }

    /* ============================================================
       SECTION: ERROR MESSAGE
    ============================================================ */
    #error-message {
      text-align: center;
      color: var(--color-ladder-warning);
      font-size: 0.85rem;
      min-height: 1.2em;
      margin-top: var(--spacing-xs);
    }

    /* ============================================================
       SECTION: HISTORY
    ============================================================ */
    #history-container {
      overflow-y: auto;
      max-height: 280px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
      padding-bottom: var(--spacing-sm);
    }

    .history-entry {
      text-align: center;
      letter-spacing: 0.15em;
      font-size: 1.2rem;
      font-weight: 500;
      opacity: 0.6;
      padding: var(--spacing-xs) 0;
    }

    /* ============================================================
       SECTION: BUTTONS
    ============================================================ */
    #submit-btn {
      width: 100%;
      height: 52px;
      background-color: var(--color-primary);
      color: var(--color-primary-text);
      font-family: var(--font-serif);
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--block-radius);
      cursor: pointer;
      box-shadow: var(--shadow-md);
    }

    #give-up-wrapper {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: var(--block-radius);
    }

    #give-up-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid rgba(196, 131, 111, 0.4);
      color: var(--color-ladder-warning);
      font-family: var(--font-serif);
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: var(--block-radius);
      position: relative;
      z-index: 1;
    }

    #give-up-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background-color: var(--color-ladder-warning);
      opacity: 0.25;
      transition: none;
      z-index: 0;
    }

    /* ============================================================
       SECTION: HIDDEN INPUT (mobile keyboard trigger)
    ============================================================ */
    #hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    /* ============================================================
       SECTION: ANIMATIONS
    ============================================================ */
    @keyframes tile-shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes tile-pop {
      0% { transform: translateY(0); opacity: 1; }
      60% { transform: translateY(-28px); opacity: 0.6; }
      100% { transform: translateY(-28px); opacity: 0; }
    }

    .tiles-shaking { animation: tile-shake 0.4s ease-in-out; }
    .tiles-popping { animation: tile-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* History start entry — slightly muted to indicate it's the origin, not a step */
    .history-entry.history-start {
      opacity: 0.45;
    }

    /* ============================================================
       SECTION: RESULTS SCREEN
    ============================================================ */
    #results-screen {
      position: fixed;
      inset: 0;
      background: var(--color-ladder-bg);
      z-index: 5000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: var(--spacing-xl) var(--spacing-lg);
      padding-top: max(60px, calc(var(--spacing-xl) + env(safe-area-inset-top)));
      overflow-y: auto;
      gap: var(--spacing-sm);
      text-align: center;
    }

    #results-screen[hidden] {
      display: none;
    }

    .results-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .results-steps {
      font-size: 1rem;
      opacity: 0.75;
    }

    .results-section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      margin-top: var(--spacing-md);
    }

    .results-optimal-path {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      max-height: 320px;
      overflow-y: auto;
    }

    .optimal-word {
      font-size: 1rem;
      letter-spacing: 0.12em;
      font-weight: 500;
      opacity: 0;
    }

    .optimal-word.optimal-start { font-weight: 700; }
    .optimal-word.optimal-end { font-weight: 700; color: var(--color-success); }
    .optimal-word.revealed { opacity: 1; transition: opacity 0.3s ease-in; }

    /* Arrow connector between words in optimal path */
    .optimal-word::after { content: '↓'; display: block; font-size: 0.65rem; opacity: 0.4; line-height: 1.2; }
    .optimal-word:last-child::after { content: ''; }

    .results-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
      justify-content: center;
      margin-top: var(--spacing-lg);
    }

    .results-btn {
      padding: 12px 24px;
      border-radius: var(--block-radius);
      font-family: var(--font-serif);
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      min-width: 120px;
    }

    .btn-primary {
      background: var(--color-primary);
      color: var(--color-primary-text);
      box-shadow: var(--shadow-md);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(44,43,40,0.3);
      color: var(--color-ladder-text);
    }

    /* ============================================================
       SECTION: CONFETTI ANIMATION
    ============================================================ */
    @keyframes confettiFall {
      0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(var(--fall-y)) translateX(var(--drift-x)) rotate(var(--spin)); opacity: 0; }
    }
  </style>
</head>
<body>
  <a href="index.html" id="back-link" aria-label="Back to Word Games hub">← Back</a>

    <button id="submit-btn" type="button">Submit</button>

    <div style="margin-top: var(--spacing-md); width: 100%;">
      <div id="give-up-wrapper">
        <button id="give-up-btn" type="button">Hold to give up</button>

      </div>

  <div id="results-screen" hidden aria-modal="true" role="dialog">
    <!-- Populated by JavaScript -->
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;" hidden></canvas>

    /* ============================================================
       SECTION: ADJACENCY MAP
       Pre-computed at startup: O(1) one-letter-change lookup
    ============================================================ */
    function buildAdjacencyMap(words) {
      const adjacency = {};
      const byLength = {};

      words.forEach(word => {
        const upper = word.toUpperCase();
        const len = upper.length;
        if (!byLength[len]) byLength[len] = [];
        byLength[len].push(upper);
        adjacency[upper] = []; // Initialize all words
      });

      words.forEach(word => {
        const upper = word.toUpperCase();
        const candidates = byLength[upper.length] || [];
        candidates.forEach(candidate => {
          if (candidate === upper) return;
          let diffs = 0;
          for (let i = 0; i < upper.length; i++) {
            if (upper[i] !== candidate[i]) diffs++;
            if (diffs > 1) break; // Early exit
          }
          if (diffs === 1) adjacency[upper].push(candidate);
        });
      });

      return adjacency;
    }

    const ADJACENCY = buildAdjacencyMap(DICTIONARY);

    /* ============================================================
       SECTION: BFS SHORTEST PATH
    ============================================================ */
    function bfsShortestPath(start, target, adjacency) {
      const startU = start.toUpperCase();
      const targetU = target.toUpperCase();
      if (startU === targetU) return [startU];

      const visited = new Set([startU]);
      const queue = [[startU, [startU]]];

      while (queue.length > 0) {
        const [current, path] = queue.shift();
        const neighbors = adjacency[current] || [];
        for (const neighbor of neighbors) {
          if (neighbor === targetU) return [...path, targetU];
          if (!visited.has(neighbor)) {
            visited.add(neighbor);
            queue.push([neighbor, [...path, neighbor]]);
          }
        }
      }
      return null;
    }

    /* ============================================================
       SECTION: SEEDED PRNG
       Copied from vowel.html — same algorithm for consistency
    ============================================================ */
    function seededRandom(seedStr) {
      let h = 0;
      for (let i = 0; i < seedStr.length; i++) {
        h = Math.imul(31, h) + seedStr.charCodeAt(i) | 0;
      }
      let s = h >>> 0;
      return function() {
        s += 0x6D2B79F5;
        let t = Math.imul(s ^ s >>> 15, 1 | s);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    /* ============================================================
       SECTION: DAILY PUZZLE ENGINE
       Deterministic seed: same date → same puzzle for all players
    ============================================================ */
    const DATE_SEED = (() => {
      const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
      return today + '_ladder_v1';
    })();

    function getDailyLadderPuzzle() {
      // Only consider 5-letter words (most ladder puzzles use 5-letter words)
      const fiveLetterWords = Object.keys(ADJACENCY).filter(w =>
        w.length === 5 && ADJACENCY[w].length >= 2 // Must have at least 2 neighbors
      );

      if (fiveLetterWords.length < 2) return null;

      // Try up to 20 seed offsets to find a valid pair with a BFS path
      for (let attempt = 0; attempt < 20; attempt++) {
        const rng = seededRandom(DATE_SEED + '_' + attempt);
        const startIdx = Math.floor(rng() * fiveLetterWords.length);
        const targetIdx = Math.floor(rng() * fiveLetterWords.length);

        const start = fiveLetterWords[startIdx];
        const target = fiveLetterWords[targetIdx];

        if (start === target) continue;

        const path = bfsShortestPath(start, target, ADJACENCY);
        if (path && path.length >= 4 && path.length <= 10) {
          // Require path of 3-9 steps (not trivially short, not impossibly long)
          return { start, target, optimalPath: path };
        }
      }

      // Absolute fallback: known-good pair
      return { start: 'STONE', target: 'CRANE', optimalPath: bfsShortestPath('STONE', 'CRANE', ADJACENCY) };
    }

    const dailyPuzzle = getDailyLadderPuzzle();
    const OPTIMAL_PATH = dailyPuzzle ? dailyPuzzle.optimalPath : null;
    const OPTIMAL_STEPS = OPTIMAL_PATH ? OPTIMAL_PATH.length - 1 : 0;

    /* ============================================================
       SECTION: VALIDATION HELPERS
    ============================================================ */
    function isValidDictionaryWord(word) {
      return !!ADJACENCY[word.toUpperCase()];
    }

    function countLetterDiffs(wordA, wordB) {
      const a = wordA.toUpperCase();
      const b = wordB.toUpperCase();
      if (a.length !== b.length) return Infinity;
      let diffs = 0;
      for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) diffs++;
      }
      return diffs;
    }

    function isValidNextWord(currentWord, candidateWord) {
      const upper = candidateWord.toUpperCase();
      const neighbors = ADJACENCY[currentWord.toUpperCase()] || [];
      return neighbors.includes(upper);
    }

    /* ============================================================
       SECTION: DAILY STATUS
       Follows vowel.html DailyStatus pattern for hub integration
    ============================================================ */
    const DailyStatus = {
      KEY: 'wordGames_dailyStatus',

      markCompleted(gameId) {
        const today = new Date().toISOString().split('T')[0];
        let status = {};
        try {
          status = JSON.parse(localStorage.getItem(this.KEY) || '{}');
        } catch(e) {}
        status[gameId] = { completed: true, dateKey: today, timestamp: Date.now() };
        try {
          localStorage.setItem(this.KEY, JSON.stringify(status));
        } catch(e) {
          console.warn('[DailyStatus] Save error:', e);
        }
      }
    };

    /* ============================================================
       SECTION: STARTUP LOG (verification)
    ============================================================ */
    console.log('[WordLadder] Today\'s puzzle:', dailyPuzzle ? dailyPuzzle.start : 'NONE', '→', dailyPuzzle ? dailyPuzzle.target : 'NONE');
    console.log('[WordLadder] Optimal steps:', OPTIMAL_STEPS);
    console.log('[WordLadder] ADJACENCY sample:', Object.keys(ADJACENCY).slice(0, 3));

    /* ============================================================
       SECTION: GAME STATE
    ============================================================ */
    let gameState = {
      currentWord: dailyPuzzle ? dailyPuzzle.start : 'STONE',
      targetWord: dailyPuzzle ? dailyPuzzle.target : 'CRANE',
      playerPath: [dailyPuzzle ? dailyPuzzle.start : 'STONE'], // Includes start word; target appended on win
      pendingTileIndex: null,  // Which tile index is being edited (null = none)
      pendingLetter: null,     // The typed letter for the pending tile (null = unchanged)
      completed: false,
      gaveUp: false,
    };

    /* ============================================================
       SECTION: DOM REFERENCES
    ============================================================ */
    const tilesContainer = document.getElementById('tiles-container');
    const historyContainer = document.getElementById('history-container');
    const targetDisplay = document.getElementById('target-display');
    const errorMessage = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');
    const giveUpBtn = document.getElementById('give-up-btn');
    const giveUpBar = document.getElementById('give-up-bar');
    const hiddenInput = document.getElementById('hidden-input');

    /* ============================================================
       SECTION: TILE RENDERING
    ============================================================ */
    const tileElements = [];

    function renderTiles(word) {
      tilesContainer.innerHTML = '';
      tileElements.length = 0;
      const letters = word.toUpperCase().split('');

      letters.forEach((letter, idx) => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.setAttribute('data-index', idx);
        tile.setAttribute('role', 'button');
        tile.setAttribute('aria-label', 'Tile ' + (idx + 1) + ': ' + letter);

        // Show pending letter if this tile is being edited
        if (idx === gameState.pendingTileIndex && gameState.pendingLetter) {
          tile.textContent = gameState.pendingLetter;
          tile.classList.add('selected');
        } else {
          tile.textContent = letter;
          if (idx === gameState.pendingTileIndex) tile.classList.add('selected');
        }

        tile.addEventListener('click', () => selectTile(idx));
        tilesContainer.appendChild(tile);
        tileElements[idx] = tile;
      });
    }

    /* ============================================================
       SECTION: TILE SELECTION
    ============================================================ */
    function selectTile(index) {
      if (gameState.completed || gameState.gaveUp) return;

      // Reset the previously pending tile to its original letter
      if (gameState.pendingTileIndex !== null && gameState.pendingTileIndex !== index) {
        tileElements[gameState.pendingTileIndex].textContent =
          gameState.currentWord[gameState.pendingTileIndex].toUpperCase();
        tileElements[gameState.pendingTileIndex].classList.remove('selected');
        gameState.pendingLetter = null;
      }

      gameState.pendingTileIndex = index;
      tileElements[index].classList.add('selected');

      // Focus hidden input so mobile keyboard opens
      hiddenInput.value = '';
      hiddenInput.focus();

      clearError();
    }

    /* ============================================================
       SECTION: HIDDEN INPUT — capture typed characters
    ============================================================ */
    hiddenInput.addEventListener('input', (e) => {
      if (gameState.pendingTileIndex === null) return;

      // Get last character typed (handles rapid input on mobile)
      const raw = e.target.value;
      const char = raw.slice(-1).toUpperCase();

      if (char && /[A-Z]/.test(char)) {
        gameState.pendingLetter = char;
        tileElements[gameState.pendingTileIndex].textContent = char;
      }

      // Reset input value so next keypress always triggers 'input' event
      e.target.value = '';
    });

    // Also listen for keydown on desktop (Enter = submit shortcut)
    hiddenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitWord();
      }
    });

    /* ============================================================
       SECTION: ERROR DISPLAY
    ============================================================ */
    function showError(msg) {
      errorMessage.textContent = msg;
    }

    function clearError() {
      errorMessage.textContent = '';
    }

    function shakeTiles() {
      tilesContainer.classList.remove('tiles-shaking');
      // Force reflow to restart animation
      void tilesContainer.offsetWidth;
      tilesContainer.classList.add('tiles-shaking');
      tilesContainer.addEventListener('animationend', () => {
        tilesContainer.classList.remove('tiles-shaking');
      }, { once: true });
    }

    /* ============================================================
       SECTION: SUBMIT BUTTON WIRE
    ============================================================ */
    submitBtn.addEventListener('click', submitWord);

    /* ============================================================
       SECTION: STAMP ANIMATION
    ============================================================ */
    function stampAnimation() {
      return new Promise(resolve => {
        tilesContainer.classList.add('tiles-popping');
        tilesContainer.addEventListener('animationend', () => {
          tilesContainer.classList.remove('tiles-popping');
          resolve();
        }, { once: true });
      });
    }

    /* ============================================================
       SECTION: HISTORY
    ============================================================ */
    function addToHistory(word, isStart = false) {
      const entry = document.createElement('div');
      entry.className = 'history-entry';
      if (isStart) entry.classList.add('history-start');
      entry.textContent = word.toUpperCase();
      entry.setAttribute('aria-label', word);
      historyContainer.appendChild(entry);

      // Auto-scroll so newest entry is always visible
      historyContainer.scrollTop = historyContainer.scrollHeight;
    }

    /* ============================================================
       SECTION: WORD SUBMISSION
    ============================================================ */
    async function submitWord() {
      if (gameState.completed || gameState.gaveUp) return;
      if (gameState.pendingTileIndex === null) {
        showError('Tap a tile to change a letter');
        return;
      }

      // Build the candidate word from current tiles
      const letters = gameState.currentWord.toUpperCase().split('');
      if (gameState.pendingLetter) {
        letters[gameState.pendingTileIndex] = gameState.pendingLetter;
      }
      const candidate = letters.join('');

      // Validation: count diffs
      const diffs = countLetterDiffs(gameState.currentWord, candidate);

      if (diffs === 0) {
        showError('Change exactly one letter');
        shakeTiles();
        return;
      }

      if (diffs > 1) {
        showError('Change exactly one letter');
        shakeTiles();
        return;
      }

      // Validation: dictionary check (must be a neighbor in adjacency map)
      if (!isValidNextWord(gameState.currentWord, candidate)) {
        showError('Not a valid word');
        shakeTiles();
        return;
      }

      // Valid word — proceed with stamp animation
      clearError();
      await stampAnimation();

      // Update state
      const prevWord = gameState.currentWord;
      gameState.currentWord = candidate;
      gameState.pendingTileIndex = null;
      gameState.pendingLetter = null;
      gameState.playerPath.push(candidate);

      // Add previous word to history (the "stamp" leaves this mark)
      addToHistory(prevWord);

      // Check win condition (exact match)
      if (candidate === gameState.targetWord) {
        gameState.completed = true;
        DailyStatus.markCompleted('ladder');
        // Slight delay before showing results to let stamp animation settle
        setTimeout(() => showResults({ solved: true }), 400);
        return;
      }

      // Render fresh tiles for the new current word
      renderTiles(candidate);
    }

    /* ============================================================
       SECTION: GIVE UP HOLD MECHANIC
    ============================================================ */
    function setupGiveUp() {
      const HOLD_DURATION_MS = 3000;
      let holdState = { active: false, startTime: null, timerId: null };

      giveUpBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        if (gameState.completed || gameState.gaveUp) return;

        holdState.active = true;
        holdState.startTime = Date.now();
        giveUpBar.style.width = '0%';

        holdState.timerId = setInterval(() => {
          const elapsed = Date.now() - holdState.startTime;
          const progress = Math.min(elapsed / HOLD_DURATION_MS, 1);
          giveUpBar.style.width = (progress * 100) + '%';

          if (progress >= 1) {
            clearInterval(holdState.timerId);
            holdState.active = false;
            triggerGiveUp();
          }
        }, 16); // ~60fps
      });

      // Cancel on pointer release (anywhere on document, in case user drags off button)
      document.addEventListener('pointerup', () => {
        if (holdState.active) {
          clearInterval(holdState.timerId);
          giveUpBar.style.width = '0%';
          holdState.active = false;
        }
      });

      document.addEventListener('pointercancel', () => {
        if (holdState.active) {
          clearInterval(holdState.timerId);
          giveUpBar.style.width = '0%';
          holdState.active = false;
        }
      });
    }

    function triggerGiveUp() {
      if (gameState.gaveUp || gameState.completed) return;
      gameState.gaveUp = true;
      DailyStatus.markCompleted('ladder');
      // showResults handles give-up animation and results display
      showResults({ solved: false });
    }

    /* ============================================================
       SECTION: GAME CONTROLS
    ============================================================ */
    function disableGameControls() {
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.4';
      giveUpBtn.disabled = true;
    }

    /* ============================================================
       SECTION: OPTIMAL PATH ANIMATION
    ============================================================ */
    async function animateOptimalPath(container) {
      // container is the .results-optimal-path div, already in the DOM
      if (!OPTIMAL_PATH) return;

      for (let i = 0; i < OPTIMAL_PATH.length; i++) {
        const word = OPTIMAL_PATH[i];
        const el = document.createElement('div');
        el.className = 'optimal-word';
        el.textContent = word;

        // Mark start and target for visual distinction
        if (i === 0) el.classList.add('optimal-start');
        if (i === OPTIMAL_PATH.length - 1) el.classList.add('optimal-end');

        container.appendChild(el);

        // Stagger each word reveal: append hidden, then fade in after brief delay
        await new Promise(resolve => setTimeout(resolve, 300));
        el.classList.add('revealed');
      }
    }

    /* ============================================================
       SECTION: CONFETTI
    ============================================================ */
    function fireConfetti() {
      const colors = ['#D4A574', '#E8C99A', '#C49060', '#F5F0E8', '#1C1B18'];
      const count = 48;
      const originX = window.innerWidth / 2;
      const originY = window.innerHeight * 0.38;

      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        const size = 5 + Math.random() * 7;
        const fallY = 180 + Math.random() * 260;
        const driftX = (Math.random() - 0.5) * 260;
        const spin = (Math.random() - 0.5) * 600;
        const duration = 0.9 + Math.random() * 0.7;
        const delay = Math.random() * 0.25;

        el.style.cssText = [
          'position:fixed',
          `left:${originX + (Math.random() - 0.5) * 40}px`,
          `top:${originY}px`,
          `width:${size}px`,
          `height:${size * (0.35 + Math.random() * 0.55)}px`,
          `background:${colors[Math.floor(Math.random() * colors.length)]}`,
          'border-radius:2px',
          'pointer-events:none',
          'z-index:9999',
          `--fall-y:${fallY}px`,
          `--drift-x:${driftX}px`,
          `--spin:${spin}deg`,
          `animation:confettiFall ${duration}s ease-in ${delay}s both`
        ].join(';');

        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove(), { once: true });
      }
    }

    /* ============================================================
       SECTION: SHARE RESULT
    ============================================================ */
    function shareResult({ solved, steps, delta }) {
      const today = new Date().toISOString().split('T')[0];
      const start = dailyPuzzle.start;
      const target = dailyPuzzle.target;

      let text;
      if (solved) {
        if (delta === 0) {
          text = `Word Ladder ${today} | ${start} → ${target} | Solved in ${steps} step${steps !== 1 ? 's' : ''} (Optimal!) 🎯`;
        } else {
          text = `Word Ladder ${today} | ${start} → ${target} | Solved in ${steps} step${steps !== 1 ? 's' : ''} (+${delta} from optimal)`;
        }
      } else {
        text = `Word Ladder ${today} | ${start} → ${target} | Gave up | Optimal: ${OPTIMAL_STEPS} step${OPTIMAL_STEPS !== 1 ? 's' : ''}`;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          const shareBtn = document.getElementById('share-btn');
          if (shareBtn) {
            const original = shareBtn.textContent;
            shareBtn.textContent = 'Copied!';
            setTimeout(() => { shareBtn.textContent = original; }, 1500);
          }
        }).catch(() => {
          prompt('Copy this result:', text);
        });
      } else {
        prompt('Copy this result:', text);
      }
    }

    /* ============================================================
       SECTION: RESET GAME (Try Again)
    ============================================================ */
    function resetGame() {
      if (!dailyPuzzle) return;
      // Reset game state — same daily puzzle, fresh attempt
      gameState.currentWord = dailyPuzzle.start;
      gameState.pendingTileIndex = null;
      gameState.pendingLetter = null;
      gameState.playerPath = [dailyPuzzle.start];
      gameState.completed = false;
      gameState.gaveUp = false;

      // Clear UI
      historyContainer.innerHTML = '';
      clearError();
      giveUpBar.style.width = '0%';

      // Re-enable game controls
      submitBtn.disabled = false;
      submitBtn.style.opacity = '';
      giveUpBtn.disabled = false;

      // Re-initialize game UI
      addToHistory(dailyPuzzle.start, true); // Start word back as first history entry
      renderTiles(dailyPuzzle.start);

      // Hide results screen
      const resultsScreen = document.getElementById('results-screen');
      resultsScreen.hidden = true;
      resultsScreen.innerHTML = '';
    }

    /* ============================================================
       SECTION: RESULTS SCREEN
    ============================================================ */
    async function showResults({ solved }) {
      disableGameControls();

      const resultsScreen = document.getElementById('results-screen');
      const steps = gameState.playerPath.length - 1; // Steps taken (start not counted)
      const delta = steps - OPTIMAL_STEPS;           // How far from optimal

      // Build results screen HTML
      let titleText, subtitleText, extraContent = '', buttonRow = '';

      if (solved) {
        if (delta === 0) {
          titleText = 'Optimal!';
          subtitleText = `Solved in ${steps} step${steps !== 1 ? 's' : ''} — perfect solution`;
        } else {
          titleText = 'Solved!';
          subtitleText = `Solved in ${steps} step${steps !== 1 ? 's' : ''} (+${delta} from optimal)`;
        }

        // Show optimal path immediately (non-animated — player already solved)
        if (OPTIMAL_PATH) {
          extraContent = `
            <div class="results-section-label">Optimal path (${OPTIMAL_STEPS} step${OPTIMAL_STEPS !== 1 ? 's' : ''})</div>
            <div class="results-optimal-path" id="results-optimal-path">
              ${OPTIMAL_PATH.map((w, i) => `<div class="optimal-word revealed ${i === 0 ? 'optimal-start' : ''} ${i === OPTIMAL_PATH.length - 1 ? 'optimal-end' : ''}">${w}</div>`).join('')}
            </div>`;
        }

        if (delta > 0) {
          buttonRow += `<button class="results-btn btn-secondary" id="try-again-btn" type="button">Try Again</button>`;
        }
      } else {
        // Gave up
        titleText = 'Gave Up';
        const remaining = gameState.playerPath.length > 1
          ? `after ${gameState.playerPath.length - 1} step${gameState.playerPath.length - 1 !== 1 ? 's' : ''}`
          : 'at the start';
        subtitleText = `${remaining} — optimal path was ${OPTIMAL_STEPS} step${OPTIMAL_STEPS !== 1 ? 's' : ''}`;

        // Optimal path will be animated — add empty container
        extraContent = `
          <div class="results-section-label">Optimal path (${OPTIMAL_STEPS} step${OPTIMAL_STEPS !== 1 ? 's' : ''})</div>
          <div class="results-optimal-path" id="results-optimal-path"></div>`;
      }

      buttonRow += `
        <button class="results-btn btn-primary" id="share-btn" type="button">Share</button>
        <a href="index.html" class="results-btn btn-secondary" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">← Word Games</a>`;

      resultsScreen.innerHTML = `
        <div class="results-title">${titleText}</div>
        <div class="results-steps">${subtitleText}</div>
        ${extraContent}
        <div class="results-actions">${buttonRow}</div>`;

      // Show results screen
      resultsScreen.hidden = false;

      // Wire Try Again if present
      const tryAgainBtn = resultsScreen.querySelector('#try-again-btn');
      if (tryAgainBtn) {
        tryAgainBtn.addEventListener('click', resetGame);
      }

      // Wire Share button
      const shareBtn = resultsScreen.querySelector('#share-btn');
      if (shareBtn) {
        shareBtn.addEventListener('click', () => shareResult({ solved, steps, delta }));
      }

      // If give-up: animate optimal path after showing screen
      if (!solved) {
        const optimalContainer = resultsScreen.querySelector('#results-optimal-path');
        await animateOptimalPath(optimalContainer);
      }

      // If optimal solve: fire confetti
      if (solved && delta === 0) {
        fireConfetti();
      }
    }

    /* ============================================================
       SECTION: GAME INIT
    ============================================================ */
    function initGame() {
      targetDisplay.textContent = gameState.targetWord;
      targetDisplay.setAttribute('aria-label', 'Target: ' + gameState.targetWord);
      addToHistory(gameState.currentWord, true); // Start word as first history entry (isStart=true)
      renderTiles(gameState.currentWord);
    }

    /* ============================================================
       SECTION: DOMCONTENTLOADED — boot the game
    ============================================================ */
    document.addEventListener('DOMContentLoaded', () => {
      initGame();
      setupGiveUp();
    });
  </script>
</body>
</html>
