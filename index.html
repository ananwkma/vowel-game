<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Vowel</title>
  <style>
    /* ============================================================
       SECTION: GOOGLE FONTS
    ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap');

    /* ============================================================
       SECTION: CSS VARIABLES
       Contrast ratios verified against WCAG AA (4.5:1 for text)
    ============================================================ */
    :root {
      /* Colors */
      --color-bg: #F8F7F4;           /* Warm off-white background */
      --color-vowel-bg: #D4A574;     /* Amber vowel block background */
      --color-vowel-text: #1C1B18;   /* Near-black text on amber — ratio: 8.38:1 ✓ */
      --color-consonant-bg: #2C2B28; /* Deep charcoal consonant block */
      --color-consonant-text: #F8F7F4; /* Off-white text on charcoal — ratio: 13.39:1 ✓ */
      --color-give-up-bg: #C4836F;   /* Dusty rose Give Up button */
      --color-give-up-text: #F8F7F4; /* Off-white on dusty rose */
      --color-win-bg: #8BAF7C;       /* Sage green win state (Phase 3) */
      --color-lose-bg: #C4836F;      /* Dusty rose lose state (Phase 3) */

      /* Typography */
      --font-serif: 'Playfair Display', 'Georgia', serif;

      /* Layout */
      --block-size: 52px;             /* Medium tiles */
      --block-radius: 5px;            /* Modern but structured */
      --block-gap: 9px;               /* Comfortable spacing */

      /* Shadows — two-layer subtle elevation */
      --shadow-block: 0 4px 6px -1px rgba(0, 0, 0, 0.10),
                      0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    /* ============================================================
       SECTION: GLOBAL RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      height: 100dvh;
      overflow: hidden;
    }

    body {
      font-family: var(--font-serif);
      background-color: var(--color-bg);
      color: var(--color-vowel-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ============================================================
       SECTION: LAYOUT
    ============================================================ */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 32px 24px;
    }

    #game-header {
      flex-shrink: 0;
    }

    #game-board-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 48px;
    }

    #game-board {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: var(--block-gap);
      position: relative; /* ADDED for correct absolute positioning of children */
    }

    #game-footer {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding-bottom: 8px;
    }

    /* ============================================================
       SECTION: TITLE
    ============================================================ */
    #game-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-vowel-text);
      text-align: center;
    }

    /* ============================================================
       SECTION: PROGRESS INDICATOR
       Word counter + 5 pip dots below the VOWEL title.
    ============================================================ */
    #progress-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    #word-counter {
      font-family: var(--font-serif);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-vowel-text);
      opacity: 0.55;
    }

    #pip-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: rgba(28, 27, 24, 0.18);  /* neutral: faint dot */
      transition: background-color 0.3s ease;
    }

    .pip.solved {
      background-color: var(--color-win-bg);    /* sage green */
    }

    .pip.gaveup {
      background-color: var(--color-lose-bg);   /* dusty rose / salmon */
    }

    /* ============================================================
       SECTION: BLOCKS (base + variants)
    ============================================================ */
    .block {
      width: var(--block-size);
      height: var(--block-size);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--block-radius);
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: var(--shadow-block);
      user-select: none;
      cursor: default;
      transition: transform 0.1s ease;
    }

    .vowel-block {
      background-color: var(--color-vowel-bg);
      color: var(--color-vowel-text);
      touch-action: none; /* Prevent scrolling on touch devices during drag */
    }

    .vowel-block.empty {
      opacity: 0.85;
    }

    .consonant-block {
      background-color: var(--color-consonant-bg);
      color: var(--color-consonant-text);
    }

    /* Styles for when a block is being dragged */
    .dragging {
      cursor: grabbing !important;
      box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.25),
                  0 4px 8px -2px rgba(0, 0, 0, 0.15);
      transform: scale(1.1); /* Slightly enlarge the block */
      z-index: 1000; /* Ensure it stays on top during drag */
      will-change: transform; /* Promote to compositor layer — avoids repaints during drag */
    }

    .placeholder-block {
      background-color: rgba(0, 0, 0, 0.1);
      border: 1px dashed rgba(0, 0, 0, 0.3);
      opacity: 0.6;
      transition: none; /* No transition for the placeholder */
    }

    /* ============================================================
       SECTION: GIVE UP BUTTON
    ============================================================ */
    #give-up-btn {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-give-up-text);
      background-color: var(--color-give-up-bg);
      border: none;
      border-radius: var(--block-radius);
      padding: 12px 28px;
      box-shadow: var(--shadow-block);
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }

    #give-up-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    #give-up-btn:active {
      transform: translateY(0);
      opacity: 1;
    }
    #give-up-btn:active {
      transform: translateY(0);
      opacity: 1;
    }

    /* ============================================================
       SECTION: GIVE UP REVEAL ANIMATION
       Scale-in animation for revealed blocks after "Give Up".
    ============================================================ */
    @keyframes revealScaleIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .reveal-scale-in {
      animation: revealScaleIn 0.25s ease-out both;
    }

    /* ============================================================
       SECTION: BLOCK SWIPE-IN ANIMATION (VIS-09)
       Staggered entrance when a new word loads onto the board.
    ============================================================ */
    @keyframes swipeIn {
      from {
        opacity: 0;
        transform: translateX(-28px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    .block-swipe-in {
      animation: swipeIn 0.32s ease-out both;
    }

    /* ============================================================
       SECTION: BLOCK SETTLE ANIMATION (VIS-08)
       Short bounce when a dragged block is dropped into place.
    ============================================================ */
    @keyframes blockSettle {
      0%   { transform: scale(1.1); }
      45%  { transform: scale(0.93); }
      75%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .block-settle {
      animation: blockSettle 0.25s ease-out both;
    }

    /* ============================================================
       SECTION: VOWEL GUIDE
       Static vertical strip — fades in on drag start, fades out on release.
       opacity starts at 0; adding .visible triggers the CSS transition.
       pointer-events: none ensures the strip never intercepts pointer events
       (vowel hit-testing is done manually via getBoundingClientRect).
    ============================================================ */
    .vowel-picker {
      display: flex;
      flex-direction: column;
      position: fixed;
      gap: 4px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-in-out;
    }

    /* Adding this class triggers the fade-in; removing it triggers the fade-out */
    .vowel-picker.visible {
      opacity: 1;
    }

    .vowel-option {
      width: var(--block-size);
      height: var(--block-size);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-vowel-text);
      opacity: 0.4;
    }

    .vowel-guide-sep {
      width: var(--block-size);
      height: var(--block-size);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-vowel-text);
      opacity: 0.2;
    }

    /* ============================================================
       SECTION: ELAPSED TIMER
       Counts up from 0:00. Sits below the progress bar, above the board.
       Small and unobtrusive — same visual weight as #word-counter.
    ============================================================ */
    #elapsed-timer {
      font-family: var(--font-serif);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-vowel-text);
      opacity: 0.55;
      text-align: center;
      margin-top: 4px;
    }

    @media (max-width: 425px) {
      :root {
        --block-size: 42px;
        --block-gap: 7px;
      }
      #app {
        padding: 24px 12px;
      }
    }

    @media (max-width: 360px) {
      :root {
        --block-size: 38px;
        --block-gap: 6px;
      }
      #app {
        padding: 20px 8px;
      }
    }
  </style>
</head>

      <h1 id="game-title">Vowel</h1>
      <div id="progress-bar">
        <span id="word-counter">Word 1 of 5</span>
        <div id="pip-row" aria-hidden="true">
          <span class="pip" data-pip="0"></span>
          <span class="pip" data-pip="1"></span>
          <span class="pip" data-pip="2"></span>
          <span class="pip" data-pip="3"></span>
          <span class="pip" data-pip="4"></span>

        <span id="elapsed-timer">0:00</span>
      </div>
    </header>
    <main id="game-board-container">

    <footer id="game-footer">
      <button id="give-up-btn" type="button">Give Up</button>

    /* ============================================================
       SECTION 2: WORD ENGINE
    ============================================================ */
    const WordEngine = {
      // Reference the pre-curated word list
      wordList: WORDS.filter(w => w.length <= 7),

      // Track recently used words to prevent immediate repeats
      // Keep last 20 to ensure good variety across sessions
      recentWords: new Set(),
      maxRecent: 20,

      /**
       * Returns a random word not seen in the recent 20 picks.
       * Uses rejection sampling (fast given 1000+ word pool).
       */
      getRandomWord() {
        // Safety: if pool is smaller than maxRecent, shrink window
        const window = Math.min(this.maxRecent, Math.floor(this.wordList.length / 2));
        let word;
        let attempts = 0;
        do {
          const idx = Math.floor(Math.random() * this.wordList.length);
          word = this.wordList[idx];
          attempts++;
          // Escape hatch: if somehow stuck (tiny list), clear recent
          if (attempts > 100) {
            this.recentWords.clear();
            break;
          }
        } while (this.recentWords.has(word));

        // Track and evict oldest if over window size
        this.recentWords.add(word);
        if (this.recentWords.size > window) {
          const oldest = this.recentWords.values().next().value;
          this.recentWords.delete(oldest);
        }

        return word;
      },

      /**
       * Extracts consonants from word in their original order.
       * Explicitly uses consonant character class [b-df-hj-np-tv-z]
       * to correctly exclude Y (which can be a vowel) and A/E/I/O/U.
       * Returns uppercase array.
       */
      extractConsonants(word) {
        return (word.toUpperCase().match(/[B-DF-HJ-NP-TV-Z]/g) || []);
      },

      /**
       * Extracts vowels from word in their original order.
       * Only A, E, I, O, U — no Y.
       * Returns uppercase array.
       */
      extractVowels(word) {
        return (word.toUpperCase().match(/[AEIOU]/g) || []);
      },

      /**
       * Returns true if word qualifies as a puzzle word:
       * - 4-10 letters long
       * - Contains at least one A/E/I/O/U vowel
       */
      isValidGameWord(word) {
        const upper = word.toUpperCase();
        return upper.length >= 4 && upper.length <= 7 && /[AEIOU]/.test(upper);
      },
    };

    // Sanity check — runs once at load, verifies extraction logic
    (function() {
      console.assert(WordEngine.extractConsonants('CROWD').join('') === 'CRWD', 'Consonant extraction: CROWD failed');
      console.assert(WordEngine.extractConsonants('BREAD').join('') === 'BRD', 'Consonant extraction: BREAD failed');
      console.assert(WordEngine.extractVowels('BREAD').join('') === 'EA', 'Vowel extraction: BREAD failed');
      console.assert(WordEngine.isValidGameWord('PLAY') === true, 'isValidGameWord: PLAY should be true');
      console.assert(WordEngine.isValidGameWord('IT') === false, 'isValidGameWord: IT too short');
      console.assert(WordEngine.isValidGameWord('CRWD') === false, 'isValidGameWord: CRWD no vowel');
      console.log('[WordEngine] Sanity checks passed. Word list size:', WordEngine.wordList.length);
    })();

    /* ============================================================
       SECTION 2.5: DAILY ENGINE
       Deterministic daily word selection seeded from the local date.
       getDailyWords() returns 5 unique words that are the same for all
       players on a given calendar day and change the next day.
    ============================================================ */
    const DATE_SEED = (function() {
      const params = new URLSearchParams(location.search);
      const dateParam = params.get('date');
      if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
        return dateParam;
      }
      return new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
    })();

    const IS_DEBUG = new URLSearchParams(location.search).has('debug');

    function seededRandom(seedStr) {
      let h = 0;
      for (let i = 0; i < seedStr.length; i++) {
        h = Math.imul(31, h) + seedStr.charCodeAt(i) | 0;
      }
      let s = h >>> 0;
      return function() {
        s += 0x6D2B79F5;
        let t = Math.imul(s ^ s >>> 15, 1 | s);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function getDailyWords() {
      const rng = seededRandom(DATE_SEED);
      const shuffled = [...WordEngine.wordList];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        const temp = shuffled[i];
        shuffled[i] = shuffled[j];
        shuffled[j] = temp;
      }
      return shuffled.slice(0, 5);
    }

    const DailyEngine = {
      dateSeed: DATE_SEED,
      isDebug: IS_DEBUG,
      dailyWords: getDailyWords(),
    };

    console.log('[DailyEngine] Date seed:', DATE_SEED, '| Words:', DailyEngine.dailyWords.join(', '), '| Debug:', IS_DEBUG);

    /* ============================================================
       SECTION 2.1: VOWEL PICKER JS
       Manages the vowel selection UI.
    ============================================================ */
    const vowelPicker = (function() {
      const pickerEl = document.querySelector('.vowel-picker');
      const vowelOptions = Array.from(pickerEl.querySelectorAll('.vowel-option'));

      const sepEl = pickerEl.querySelector('.vowel-guide-sep');

      // Set full position (called once on drag start).
      // '_' separator is vertically centred on the block; A/E above, I/O/U below.
      function positionAround(element) {
        const rect = element.getBoundingClientRect();
        const guideWidth = pickerEl.offsetWidth;
        const sepCenter  = sepEl.offsetTop + sepEl.offsetHeight / 2;
        pickerEl.style.left = (rect.left + rect.width / 2 - guideWidth / 2) + 'px';
        pickerEl.style.top  = (rect.top  + rect.height / 2 - sepCenter) + 'px';
      }

      // Only update horizontal position — top stays fixed after show().
      function trackX(element) {
        const rect = element.getBoundingClientRect();
        const guideWidth = pickerEl.offsetWidth;
        pickerEl.style.left = (rect.left + rect.width / 2 - guideWidth / 2) + 'px';
      }

      // Same as trackX but accepts a precomputed client-space center X — avoids a layout read.
      function trackXAt(centerClientX) {
        pickerEl.style.left = (centerClientX - pickerEl.offsetWidth / 2) + 'px';
      }

      function show(element) {
        // Position first so the picker is in the right place before it becomes visible.
        // requestAnimationFrame defers adding 'visible' to the next paint, ensuring
        // the browser registers the opacity:0 starting state and triggers the transition.
        positionAround(element);
        requestAnimationFrame(() => pickerEl.classList.add('visible'));
      }

      function hide() {
        // Removing 'visible' triggers the CSS fade-out transition (opacity 1 -> 0).
        // The element remains in the DOM at opacity:0 (no removal needed).
        pickerEl.classList.remove('visible');
      }

      // Returns the vowel character if (clientX, clientY) is over an option, else null.
      // Uses manual rect hit-testing so it works even when pointer-events: none.
      function getVowelAtPoint(clientX, clientY) {
        for (const option of vowelOptions) {
          const rect = option.getBoundingClientRect();
          if (clientX >= rect.left && clientX <= rect.right &&
              clientY >= rect.top  && clientY <= rect.bottom) {
            return option.dataset.vowel;
          }
        }
        return null;
      }

      return { show, hide, positionAround, trackX, trackXAt, getVowelAtPoint };
    })();

    /* ============================================================
       SECTION 3: GAME STATE
       Single source of truth for all rendering.
       renderBoard() reads from this object exclusively.
    ============================================================ */
    const gameState = {
      currentWord: null,      // e.g. 'CROWD'
      consonants: [],         // e.g. ['C', 'R', 'W', 'D']
      vowels: [],             // e.g. ['O'] (original vowels, for Give Up reveal in Phase 3)
      vowelCount: 0,          // e.g. 1 (number of blank yellow blocks to show)
      phase: 'playing',       // 'playing' | 'won' | 'gaveup' (used in Phase 3)
    };

    // Global variables for drag and drop state
    let currentDraggable = null;
    let placeholderEl = null;
    let guideEl = null;
    const gameBoard = document.getElementById('game-board');
    let dragStartX, dragStartY;
    let initialDraggableRect;
    let initialDraggableXOffset = 0;
    let gameBoardRect;
    let dragStartText = '_'; // value of the block before dragging started
    let dragInitiated = false; // true once the pointer has actually moved after pointerdown
    let prevPointerX = 0;    // tracks horizontal pointer direction for leading-edge detection
    let rafPending = false;
    let latestPointerEvent = null;

    /* ============================================================
       SECTION 4: DOM RENDERING
       renderBoard(state) — pure function converting state to DOM.
       Always clear and re-render; never patch.
    ============================================================ */
    function renderBoard(state) {
      const board = document.getElementById('game-board');
      board.innerHTML = ''; // Clear previous render

      // Create a document fragment for efficient batch DOM update
      const fragment = document.createDocumentFragment();
      let blockIndex = 0; // continuous index for staggered swipe-in delay

      // 1. Render blank vowel placeholder blocks on the LEFT
      //    (one per vowel in the original word)
      for (let i = 0; i < state.vowelCount; i++) {
        const block = document.createElement('div');
        block.className = 'block vowel-block empty block-swipe-in';
        block.textContent = '_';
        block.setAttribute('data-vowel-index', i);
        block.setAttribute('aria-label', 'Vowel placeholder ' + (i + 1));
        block.setAttribute('role', 'button');
        block.setAttribute('tabindex', '0');
        block.setAttribute('data-draggable', 'true');
        block.style.animationDelay = (blockIndex++ * 0.04) + 's';
        block.addEventListener('animationend', () => block.classList.remove('block-swipe-in'), { once: true });
        fragment.appendChild(block);
      }

      // 2. Render consonant blocks on the RIGHT, in original order
      state.consonants.forEach((letter, idx) => {
        const block = document.createElement('div');
        block.className = 'block consonant-block block-swipe-in';
        block.textContent = letter;
        block.setAttribute('data-consonant-index', idx);
        block.setAttribute('aria-label', 'Consonant ' + letter);
        block.setAttribute('aria-disabled', 'true');
        block.style.animationDelay = (blockIndex++ * 0.04) + 's';
        block.addEventListener('animationend', () => block.classList.remove('block-swipe-in'), { once: true });
        fragment.appendChild(block);
      });

      board.appendChild(fragment);
    }

    /**
     * Updates the Word X of 5 counter and pip dot colors from puzzleState.
     * Called by initGame() and showPuzzleComplete().
     * Pip outcomes: 'solved' → green, 'gaveup' → salmon, no outcome → neutral.
     * The current word's pip (puzzleState.wordIndex) is always neutral until completed.
     */
    function renderProgress() {
      const counter = document.getElementById('word-counter');
      const pips = document.querySelectorAll('.pip');

      // wordIndex is 0-based; display as 1-based, capped at 5
      const displayIndex = Math.min(puzzleState.wordIndex + 1, 5);
      if (counter) counter.textContent = 'Word ' + displayIndex + ' of 5';

      pips.forEach((pip, i) => {
        pip.classList.remove('solved', 'gaveup');
        const outcome = puzzleState.outcomes[i];
        if (outcome === 'solved') pip.classList.add('solved');
        else if (outcome === 'gaveup') pip.classList.add('gaveup');
        // else: neutral (no class added)
      });
    }

    /* ============================================================
       SECTION 5: EVENT LISTENERS
       Give Up handler — no-op shell for Phase 2 wiring.
       Drag events handled in Phase 2.
    ============================================================ */
    document.getElementById('give-up-btn').addEventListener('click', function() {
      // Block clicks during feedback window (won / gaveup phases)
      if (gameState.phase !== 'playing') return;

      const penalty = giveUpCountdown.getPenalty(); // read before stop clears the value
      giveUpCountdown.stop();

      console.log('[GiveUp] Penalty:', penalty, '| Revealing target word:', gameState.currentWord);
      gameState.phase = 'gaveup';
      applyStateVisuals('gaveup');

      // Freeze the timer first (captures exact elapsed without double-counting),
      // then add penalty and update display
      elapsedTimer.pause();
      puzzleState.timerElapsed += penalty;
      if (penalty > 0) {
        elapsedTimer.setBase(puzzleState.timerElapsed);
      }

      puzzleState.outcomes.push('gaveup');
      savePuzzleState();
      revealTargetWord();
      scheduleAutoAdvance(2000);
    });

    /**
     * Hides the vowel picker (guide column) by triggering its CSS fade-out.
     * The picker element remains in the DOM at opacity:0; only the 'visible'
     * class is removed so the CSS transition animates the fade.
     * Called during initGame() to ensure no stale picker is visible between rounds.
     */
    function removeGuideColumn() {
      vowelPicker.hide();
    }

    /* ============================================================
       SECTION 5.5: DRAG AND DROP
    ============================================================ */

    // Returns all board children except the dragged block and placeholder
    function getCurrentBlocks() {
      return Array.from(gameBoard.children).filter(el => el !== currentDraggable && el !== placeholderEl);
    }

    // Returns the index at which to insert the dragged block based on its center X
    function getInsertionPoint(draggedX) {
      const blocks = getCurrentBlocks();
      let targetIndex = blocks.length;
      for (let i = 0; i < blocks.length; i++) {
        const blockRect = blocks[i].getBoundingClientRect();
        if (draggedX < blockRect.left + blockRect.width / 2) {
          targetIndex = i;
          break;
        }
      }
      return targetIndex;
    }

    // Updates the dragged element's horizontal position (clamped to board bounds)
    function moveAt(pageX, pageY) {
      const constrainedTranslateX = pageX - dragStartX;
      const currentLeftRelativeToBoard = initialDraggableXOffset + constrainedTranslateX;
      let finalTranslateX = constrainedTranslateX;
      if (currentLeftRelativeToBoard < 0) {
        finalTranslateX = -initialDraggableXOffset;
      } else if (currentLeftRelativeToBoard + initialDraggableRect.width > gameBoardRect.width) {
        finalTranslateX = gameBoardRect.width - initialDraggableRect.width - initialDraggableXOffset;
      }
      const translateY = pageY - dragStartY;
      currentDraggable.style.transform = `translate(${finalTranslateX}px, ${translateY}px) scale(1.1)`;
      return finalTranslateX;
    }

    function onPointerMove(event) {
      if (!currentDraggable) return;
      // preventDefault must be synchronous — not inside rAF.
      event.preventDefault();

      latestPointerEvent = event;
      if (rafPending) return;
      rafPending = true;

      requestAnimationFrame(function processDragFrame() {
        rafPending = false;
        const ev = latestPointerEvent;
        if (!currentDraggable || !ev) return;

        // First actual movement — only reset to '_' if block was empty
        if (!dragInitiated) {
          dragInitiated = true;
          if (dragStartText === '_') {
            currentDraggable.textContent = '_';
            currentDraggable.classList.add('empty');
          }
        }

        // moveAt() returns the clamped translation so we can compute the
        // block's client-space position without a second getBoundingClientRect().
        const finalTranslateX = moveAt(ev.pageX, ev.pageY);
        const blockCenterX = initialDraggableRect.left + finalTranslateX + initialDraggableRect.width / 2;
        vowelPicker.trackXAt(blockCenterX);

        // Update the dragged block's letter based on which vowel the pointer is over.
        const hoveredVowel = vowelPicker.getVowelAtPoint(ev.clientX, ev.clientY);
        if (hoveredVowel) {
          currentDraggable.textContent = hoveredVowel;
          currentDraggable.classList.remove('empty');
        }

        // Use the leading edge (right when moving right, left when moving left)
        // computed from known position — no getBoundingClientRect() on dragged element.
        const blockClientLeft  = initialDraggableRect.left + finalTranslateX;
        const blockClientRight = blockClientLeft + initialDraggableRect.width;
        const movingRight = ev.clientX >= prevPointerX;
        const leadingEdge = movingRight ? blockClientRight : blockClientLeft;
        prevPointerX = ev.clientX;
        const insertionPointIndex = getInsertionPoint(leadingEdge);
        const blocks = getCurrentBlocks();

        if (!placeholderEl) {
          placeholderEl = document.createElement('div');
          placeholderEl.className = 'block vowel-block placeholder-block';
          placeholderEl.style.width = `${initialDraggableRect.width}px`;
          placeholderEl.style.height = `${initialDraggableRect.height}px`;
        }

        const currentPlaceholderParent = placeholderEl.parentNode;
        const currentPlaceholderNextSibling = placeholderEl.nextSibling;

        if (insertionPointIndex < blocks.length) {
          if (currentPlaceholderParent !== gameBoard || currentPlaceholderNextSibling !== blocks[insertionPointIndex]) {
            gameBoard.insertBefore(placeholderEl, blocks[insertionPointIndex]);
          }
        } else {
          if (currentPlaceholderParent !== gameBoard || currentPlaceholderNextSibling !== null) {
            gameBoard.appendChild(placeholderEl);
          }
        }
      });
    }

    document.addEventListener('pointermove', onPointerMove);

    document.addEventListener('pointerdown', function(event) {
      // Block all interaction during feedback window (won / gaveup phases)
      if (gameState.phase !== 'playing') return;

      const draggable = event.target.closest('.vowel-block[data-draggable="true"]');
      if (!draggable || event.button !== 0) return;

      currentDraggable = draggable;
      currentDraggable.classList.remove('block-swipe-in'); // stop animation so inline transform takes over
      currentDraggable.classList.add('dragging');
      dragInitiated = false; // will be set true on first pointermove

      dragStartX = event.clientX;
      dragStartY = event.clientY;
      prevPointerX = event.clientX;
      initialDraggableRect = currentDraggable.getBoundingClientRect();
      gameBoardRect = gameBoard.getBoundingClientRect();
      initialDraggableXOffset = initialDraggableRect.left - gameBoardRect.left;

      currentDraggable.style.position = 'absolute';
      currentDraggable.style.zIndex = 1000;
      currentDraggable.style.left = `${initialDraggableRect.left - gameBoardRect.left}px`;
      currentDraggable.style.top = `${initialDraggableRect.top - gameBoardRect.top}px`;
      currentDraggable.style.margin = '0';
      currentDraggable.style.width = `${initialDraggableRect.width}px`;
      currentDraggable.style.height = `${initialDraggableRect.height}px`;

      const originalIndex = Array.from(gameBoard.children).indexOf(currentDraggable);
      placeholderEl = document.createElement('div');
      placeholderEl.className = 'block vowel-block placeholder-block';
      placeholderEl.style.width = `${initialDraggableRect.width}px`;
      placeholderEl.style.height = `${initialDraggableRect.height}px`;
      if (originalIndex !== -1 && originalIndex < gameBoard.children.length) {
        gameBoard.insertBefore(placeholderEl, gameBoard.children[originalIndex]);
      } else {
        gameBoard.appendChild(placeholderEl);
      }

      // Capture text and show picker immediately on lift — before any movement
      dragStartText = currentDraggable.textContent.trim();
      vowelPicker.show(currentDraggable);

      event.preventDefault();
    });

    document.addEventListener('pointercancel', function() {
      rafPending = false;
      latestPointerEvent = null;
      if (currentDraggable) {
        currentDraggable.classList.remove('dragging');
        currentDraggable.style.position = '';
        currentDraggable.style.zIndex = '';
        currentDraggable.style.left = '';
        currentDraggable.style.top = '';
        currentDraggable.style.transform = '';
        currentDraggable.style.margin = '';
        currentDraggable.style.width = '';
        currentDraggable.style.height = '';
        // Restore original value on cancel (only if drag had started)
        if (dragInitiated) {
          currentDraggable.textContent = dragStartText;
          if (dragStartText !== '_') currentDraggable.classList.remove('empty');
        }
        currentDraggable = null;
      }
      if (placeholderEl && placeholderEl.parentNode) {
        placeholderEl.parentNode.removeChild(placeholderEl);
      }
      placeholderEl = null;
      vowelPicker.hide();
    });

    document.addEventListener('pointerup', function(event) {
      rafPending = false;
      latestPointerEvent = null;
      if (!currentDraggable) return;

      const droppedElement = currentDraggable;
      droppedElement.classList.remove('dragging');

      droppedElement.style.position = '';
      droppedElement.style.zIndex = '';
      droppedElement.style.left = '';
      droppedElement.style.top = '';
      droppedElement.style.transform = '';
      droppedElement.style.margin = '';
      droppedElement.style.width = '';
      droppedElement.style.height = '';

      // Replace the placeholder with the dropped element — placeholder is already
      // in the correct position from the leading-edge logic used during drag.
      if (placeholderEl && placeholderEl.parentNode) {
        placeholderEl.parentNode.replaceChild(droppedElement, placeholderEl);
      } else {
        gameBoard.appendChild(droppedElement);
      }
      placeholderEl = null;

      // Settle bounce — remove class after animation so it can re-trigger next drag
      droppedElement.classList.add('block-settle');
      droppedElement.addEventListener('animationend', () => droppedElement.classList.remove('block-settle'), { once: true });

      if (dragInitiated) {
        vowelPicker.hide();
        // If released without hovering a vowel, restore the block's previous value
        if (droppedElement.textContent.trim() === '_') {
          droppedElement.textContent = dragStartText;
          if (dragStartText !== '_') droppedElement.classList.remove('empty');
        }
        checkWinCondition();
      }

      currentDraggable = null;
    });

    /* ============================================================
       SECTION 5.8: ELAPSED TIMER
       Counts up from puzzleState.timerElapsed (restored on reload).
       Displays M:SS format. Runs continuously through word transitions.
       Stops when showPuzzleComplete() is called.
    ============================================================ */
    const elapsedTimer = (function() {
      let intervalId = null;
      let baseSeconds = 0;   // accumulated seconds from previous words + restored from localStorage
      let startTime = null;  // Date.now() at last start(), for drift-free counting

      const el = document.getElementById('elapsed-timer');

      function formatTime(totalSeconds) {
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        return m + ':' + (s < 10 ? '0' : '') + s;
      }

      function tick() {
        const elapsed = baseSeconds + Math.floor((Date.now() - startTime) / 1000);
        if (el) el.textContent = formatTime(elapsed);
        // Sync puzzleState and persist so refresh restores the current second
        puzzleState.timerElapsed = elapsed;
        savePuzzleState();
      }

      function start() {
        if (intervalId !== null) return; // already running — do not reset
        startTime = Date.now();
        // Render immediately so there's no 1-second blank delay
        tick();
        intervalId = setInterval(tick, 1000);
      }

      // Freezes the timer at the current elapsed value. Safe to call when already stopped.
      // Used at word end (win/give-up) so the timer doesn't run during the feedback window.
      function pause() {
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
        if (startTime !== null) {
          baseSeconds = baseSeconds + Math.floor((Date.now() - startTime) / 1000);
          startTime = null;
        }
        puzzleState.timerElapsed = baseSeconds;
        if (el) el.textContent = formatTime(baseSeconds);
        savePuzzleState();
      }

      function stop() {
        pause();
      }

      // Sets the accumulated base (e.g. after restore or penalty). Does not start/stop the timer.
      function setBase(seconds) {
        baseSeconds = typeof seconds === 'number' ? seconds : 0;
        if (el) el.textContent = formatTime(baseSeconds);
      }

      return { start, pause, stop, setBase };
    })();

    /* ============================================================
       SECTION 5.9: GIVE UP COUNTDOWN
       Per-word penalty countdown: starts at 60, counts down to 0 each second.
       When > 0: Give Up button shows "Give Up (N)".
       When 0: number disappears, Give Up is free (no penalty).
       Resets to 60 on each new word (called from initGame()).
       Penalty is read at the moment Give Up is pressed.
    ============================================================ */
    const giveUpCountdown = (function() {
      const COUNTDOWN_START = 60;
      let current = COUNTDOWN_START;
      let intervalId = null;
      const btn = document.getElementById('give-up-btn');

      function updateButtonText() {
        if (!btn) return;
        if (current > 0) {
          btn.textContent = 'Give Up (' + current + ')';
        } else {
          btn.textContent = 'Give Up';
        }
      }

      function tick() {
        if (current > 0) {
          current -= 1;
          puzzleState.giveUpRemaining = current;
          savePuzzleState();
          updateButtonText();
        } else {
          // Countdown finished — stop the interval, button stays as "Give Up"
          stop();
        }
      }

      function reset(from) {
        // Stop any existing countdown before starting a new one
        stop();
        current = (typeof from === 'number' && from > 0) ? from : COUNTDOWN_START;
        puzzleState.giveUpRemaining = current;
        updateButtonText();
        intervalId = setInterval(tick, 1000);
      }

      function stop() {
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }

      // Returns the penalty value at the moment Give Up is pressed.
      // If countdown has reached 0, penalty is 0 (free Give Up).
      function getPenalty() {
        return current;
      }

      return { reset, stop, getPenalty };
    })();

    /* ============================================================
       SECTION 6: INIT
       initGame() — called once on load and after each round ends.
       Selects a word, extracts letters, updates state, renders board.
    ============================================================ */
    function initGame() {
      // Clear any active drag state or picker from previous round
      if (currentDraggable) {
        currentDraggable.classList.remove('dragging');
        currentDraggable.style.cssText = ''; // Clear inline styles
        currentDraggable = null;
      }
      if (placeholderEl && placeholderEl.parentNode) {
        placeholderEl.parentNode.removeChild(placeholderEl);
        placeholderEl = null;
      }
      removeGuideColumn();
      vowelPicker.hide();

      // Proceed with new game initialization
      const word = DailyEngine.dailyWords[puzzleState.wordIndex];

      gameState.currentWord = word;
      gameState.consonants = WordEngine.extractConsonants(word);
      gameState.vowels = WordEngine.extractVowels(word);
      gameState.vowelCount = gameState.vowels.length;
      gameState.phase = 'playing';

      renderBoard(gameState);
      renderProgress();

      console.log('[Game] New word loaded:', word,
        '| Consonants:', gameState.consonants.join(''),
        '| Vowel count:', gameState.vowelCount);

      elapsedTimer.setBase(puzzleState.timerElapsed);
      elapsedTimer.start();
      giveUpCountdown.reset(puzzleState.giveUpRemaining);
    }

  </script>

  <script>
    /* ============================================================
       SECTION 3.5: PUZZLE STATE
       Daily puzzle bookkeeping — tracks which word we're on,
       per-word outcomes, and completion. Persisted to localStorage
       keyed by today's date so mid-puzzle reloads resume correctly.
    ============================================================ */
    let puzzleState = {
      dateKey: DailyEngine.dateSeed,    // YYYY-MM-DD string
      wordIndex: 0,                      // 0-4, current word position
      outcomes: [],                      // Array of 'solved'|'gaveup' for completed words
      timerElapsed: 0,                   // accumulated seconds including penalties
      giveUpRemaining: 60,               // countdown value to restore on reload
      complete: false,                   // true after 5th word finishes
    };

    function savePuzzleState() {
      try {
        const key = 'vowel_puzzle_' + puzzleState.dateKey;
        localStorage.setItem(key, JSON.stringify(puzzleState));
      } catch (e) {
        console.warn('[PuzzleState] Failed to save:', e);
      }
    }

    function loadPuzzleState() {
      try {
        const key = 'vowel_puzzle_' + DailyEngine.dateSeed;
        const raw = localStorage.getItem(key);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.dateKey === DailyEngine.dateSeed) {
            puzzleState.dateKey = parsed.dateKey;
            puzzleState.wordIndex = typeof parsed.wordIndex === 'number' ? parsed.wordIndex : 0;
            puzzleState.outcomes = Array.isArray(parsed.outcomes) ? parsed.outcomes : [];
            puzzleState.timerElapsed = typeof parsed.timerElapsed === 'number' ? parsed.timerElapsed : 0;
            puzzleState.giveUpRemaining = typeof parsed.giveUpRemaining === 'number' ? parsed.giveUpRemaining : 60;
            puzzleState.complete = parsed.complete === true;
            // Guard: if already complete and not in debug mode, keep complete flag
            if (parsed.complete === true && DailyEngine.isDebug === false) {
              puzzleState.complete = true;
            }
          }
        }
      } catch (e) {
        console.warn('[PuzzleState] Failed to load:', e);
      }
      console.log('[PuzzleState] Loaded:', JSON.stringify(puzzleState));
    }

    /* ============================================================
       SECTION 7: VALIDATION & STATE MANAGEMENT
    ============================================================ */
    // O(1) word membership lookup — built once at startup from the WORDS array
    const WordSet = new Set(WORDS);

    /**
     * Returns the word constructed from blocks in their current DOM order.
     * Reads left-to-right visual order from the game board.
     * Skips placeholder-block elements (drag artifacts).
     * Returns uppercase string.
     */
    function constructedWord() {
      const board = document.getElementById('game-board');
      const blocks = Array.from(board.children).filter(
        el => el.classList.contains('block') &&
              !el.classList.contains('placeholder-block') &&
              !el.classList.contains('vowel-picker') // Exclude vowel picker
      );
      return blocks.map(b => b.textContent.trim()).join('').toUpperCase();
    }

    /**
     * Checks win condition:
     * - Game must be in 'playing' phase (guard against re-triggering)
     * - All vowel-blocks must be present in the DOM (count matches vowelCount)
     * - All vowel-blocks must show a vowel letter (not '_')
     * - The constructed word must exist in WordSet
     * Returns true if win triggered, false otherwise.
     */
    function checkWinCondition() {
      if (gameState.phase !== 'playing') return false;

      const board = document.getElementById('game-board');
      const vowelBlocks = Array.from(board.querySelectorAll('.vowel-block:not(.placeholder-block)'));

      // Strict check: ensure exact number of vowel blocks are on the board
      const allPlaced = vowelBlocks.length === gameState.vowelCount;
      const allHaveVowels = allPlaced && vowelBlocks.every(b => b.textContent.trim() !== '_');

      if (allPlaced && allHaveVowels) {
        const word = constructedWord();
        if (WordSet.has(word)) {
          console.log('[Validation] Word SUCCESS:', word);
          gameState.phase = 'won';
          applyStateVisuals('won');
          elapsedTimer.pause();
          giveUpCountdown.stop();
          puzzleState.outcomes.push('solved');
          savePuzzleState();

          // Apply scaleIn animation to all blocks on successful word (Phase 4)
          // For now, no specific animation here. Will be added in Phase 4.

          scheduleAutoAdvance(2000); // Auto-advance after 2 seconds
          return true;
        } else {
          console.log('[Validation] Word FAIL:', word);
        }
      }
      return false;
    }

    /* ============================================================
       SECTION 8: ANIMATION & TIMING
    ============================================================ */

    // Single timer reference — prevents overlapping auto-advances
    let advanceTimer = null;

    /**
     * Applies background color for the current game phase.
     * Uses CSS transition on body for smooth color change.
     */
    function applyStateVisuals(phase) {
      const body = document.body;
      if (phase === 'won') {
        // 0.3s flash into win state
        body.style.transition = 'background-color 0.3s ease-in-out';
        body.style.backgroundColor = 'var(--color-win-bg)';
      } else if (phase === 'gaveup') {
        // 0.3s flash into give-up state
        body.style.transition = 'background-color 0.3s ease-in-out';
        body.style.backgroundColor = 'var(--color-lose-bg)';
      } else {
        // 0.5s gentle return to neutral play state
        body.style.transition = 'background-color 0.5s ease-in-out';
        body.style.backgroundColor = 'var(--color-bg)';
      }
    }

    /**
     * Schedules auto-advance to next puzzle after delayMs.
     * Clears any previously scheduled advance before setting new one.
     * After word 5 (wordIndex reaches 5), ends the puzzle instead of loading a new word.
     */
    function scheduleAutoAdvance(delayMs) {
      if (advanceTimer) clearTimeout(advanceTimer);
      advanceTimer = setTimeout(() => {
        applyStateVisuals('playing');
        puzzleState.wordIndex += 1;

        if (puzzleState.wordIndex >= 5) {
          // Puzzle complete — all 5 words done
          puzzleState.complete = true;
          savePuzzleState();
          showPuzzleComplete();   // stub function defined below
        } else {
          puzzleState.giveUpRemaining = 60; // fresh countdown for next word
          savePuzzleState();
          initGame();
        }
        advanceTimer = null;
      }, delayMs);
    }

    /**
     * Stub results screen shown after the 5th word completes.
     * Phase 8 will replace this with the full results/share screen.
     */
    function showPuzzleComplete() {
      giveUpCountdown.stop();
      elapsedTimer.stop();
      // Phase 8 will replace this with the full results screen.
      // For now: display a minimal "Puzzle complete!" message.
      const board = document.getElementById('game-board');
      board.innerHTML = '';
      const msg = document.createElement('div');
      msg.style.cssText = 'font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700; letter-spacing: 0.1em; text-align: center; color: var(--color-vowel-text); padding: 24px;';
      msg.textContent = 'Puzzle complete!';
      board.appendChild(msg);
      document.getElementById('give-up-btn').style.display = 'none';
      renderProgress();
      console.log('[Puzzle] Complete! Outcomes:', puzzleState.outcomes.join(', '));
    }

    /* ============================================================
       SECTION 8.1: GIVE UP REVEAL
       Re-renders the board to show the target word in its correct
       structure: vowels (amber) interleaved with consonants (charcoal)
       exactly as the word was intended.
    ============================================================ */

    /**
     * Reveals the target word by completely re-rendering the board.
     * Vowels are shown as amber vowel-block elements with the correct letter.
     * Consonants are shown as charcoal consonant-block elements.
     * Blocks animate in with a scale-in CSS class for visual polish.
     */
    function revealTargetWord() {
      const board = document.getElementById('game-board');
      board.innerHTML = ''; // Clear current state entirely

      const word = gameState.currentWord.toUpperCase();
      const fragment = document.createDocumentFragment();

      for (let i = 0; i < word.length; i++) {
        const letter = word[i];
        const block = document.createElement('div');

        if (/[AEIOU]/.test(letter)) {
          // Vowel: render as amber block
          block.className = 'block vowel-block reveal-scale-in';
          block.setAttribute('aria-label', 'Vowel ' + letter);
        } else {
          // Consonant: render as charcoal block
          block.className = 'block consonant-block reveal-scale-in';
          block.setAttribute('aria-label', 'Consonant ' + letter);
          block.setAttribute('aria-disabled', 'true');
        }

        block.textContent = letter;
        // Stagger animation delay per block for a cascading effect
        block.style.animationDelay = (i * 0.05) + 's';
        fragment.appendChild(block);
      }

      board.appendChild(fragment);
      console.log('[GiveUp] Board revealed as:', word);
    }

    // Start the game when the DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      loadPuzzleState();

      if (puzzleState.complete && !DailyEngine.isDebug) {
        // Today's puzzle already finished — skip straight to results
        console.log('[Puzzle] Already complete for', puzzleState.dateKey, '— showing results');
        elapsedTimer.setBase(puzzleState.timerElapsed);
        showPuzzleComplete();
        renderProgress(); // Show correct pip state on the results screen
        return;
      }

      // Debug mode: reset completed state so replay starts from word 0
      if (DailyEngine.isDebug && puzzleState.complete) {
        puzzleState.wordIndex = 0;
        puzzleState.outcomes = [];
        puzzleState.complete = false;
        puzzleState.timerElapsed = 0;
        console.log('[Debug] Puzzle was complete — resetting for replay');
      }

      elapsedTimer.setBase(puzzleState.timerElapsed);
      initGame();
    });
  </script>
</body>
</html>
