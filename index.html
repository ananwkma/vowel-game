<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Games</title>
  <link rel="stylesheet" href="styles/design-tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-serif);
      background-color: var(--color-bg);
      color: var(--color-primary-text);
      min-height: 100vh;
      padding: var(--spacing-xl) var(--spacing-md);
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #hub-container {
      max-width: 600px;
      margin: 0 auto;
    }

    #hub-title {
      font-size: 2rem;
      text-align: center;
      color: var(--color-primary-text);
      margin-bottom: var(--spacing-sm);
    }

    #hub-tagline {
      text-align: center;
      font-size: 1rem;
      opacity: 0.65;
      margin-bottom: var(--spacing-xl);
    }

    #hub-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--spacing-md);
    }

    @media (min-width: 768px) {
      #hub-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .game-card {
      display: block;
      padding: var(--spacing-lg);
      background: #FFFFFF;
      border-radius: var(--block-radius);
      box-shadow: var(--shadow-md);
      text-align: center;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition:
        opacity var(--transition-normal),
        filter var(--transition-normal),
        transform var(--transition-normal),
        box-shadow var(--transition-normal);
    }

    .game-card:not(.disabled):hover {
      filter: brightness(0.95) saturate(1.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.15),
                  0 4px 8px -2px rgba(0, 0, 0, 0.10);
    }

    .game-card.disabled {
      opacity: 0.45;
      filter: grayscale(80%);
      cursor: default;
      pointer-events: none;
    }

    .game-card.completed {
      opacity: 0.65;
    }

    .game-card h2 {
      font-size: 1.25rem;
      color: var(--color-primary-text);
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="hub-container">
    <h1 id="hub-title" data-collection-name="Word Games">Word Games</h1>
    <p id="hub-tagline">Daily puzzles await</p>

    <div id="hub-grid">
      <a href="vowel.html" class="game-card" id="card-vowel" data-game="vowel">
        <h2>VOWEL</h2>
      </a>
      <div class="game-card disabled" id="card-ladder" aria-disabled="true">
        <h2>Word Ladder</h2>
      </div>
      <div class="game-card disabled" id="card-hunt" aria-disabled="true">
        <h2>Letter Hunt</h2>
      </div>
    </div>
  </div>

  <script>
  // localStorage namespace:
  // - wordGames_dailyStatus: { vowel: { completed, dateKey, timestamp }, ... } — shared hub key
  // - vowel_*, ladder_*, hunt_* prefixes: game-specific state (owned by each game)
  (function() {
    try {
      const status = JSON.parse(localStorage.getItem('wordGames_dailyStatus') || '{}');
      const today = new Date().toISOString().split('T')[0];
      ['vowel', 'ladder', 'hunt'].forEach(function(gameId) {
        const record = status[gameId];
        if (record && record.completed && record.dateKey === today) {
          const card = document.getElementById('card-' + gameId);
          if (card) card.classList.add('completed');
        }
      });
    } catch(e) {
      // localStorage unavailable — ignore silently
    }
  })();
  </script>
</body>
</html>
